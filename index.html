<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Habit Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Grain/Noise overlay -->
<div class="noise-overlay"></div>

<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <label for="userName">Name:</label>
      <input type="text" id="userName" placeholder="Your name">
    </div>

    <h1 class="title">Monthly Habit Tracker</h1>

    <div class="header-right">
      <label for="monthInput">Month:</label>
      <input type="month" id="monthInput">
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <!-- Habit Table -->
  <section class="habit-section">
    <div class="table-wrapper">
      <table id="habitTable">
        <thead>
          <tr>
            <th class="habit-col">HABITS/PROTOCOLS</th>
            <!-- Day columns 1-31 generated by JS -->
          </tr>
        </thead>
        <tbody id="habitBody">
          <!-- Habit rows generated by JS -->
        </tbody>
      </table>
    </div>

    <button id="addHabitBtn" class="add-btn">+ Add Habit</button>
  </section>
<!-- === DAILY GOALS SECTION === -->
<div class="goals-section">
  <h3>Daily Goals</h3>
  <div class="goals-input">
    <input type="text" id="goalInput" placeholder="Add a goal..." />
    <button id="addGoalBtn" class="add-btn">+</button>
  </div>

  <ul id="goalList"></ul>
</div>
  <!-- Bottom Section: Graph + Streaks -->
  <section class="bottom-section">

    <div class="graph-box">
      <h3>Daily Score Graph</h3>
      <canvas id="scoreGraph"></canvas>
    </div>

    <div class="streak-box">
      <div class="progress-ring-wrapper">
        <svg class="progress-ring" width="120" height="120">
          <circle class="progress-ring-bg" cx="60" cy="60" r="52"></circle>
          <circle class="progress-ring-fill" id="progressRingFill" cx="60" cy="60" r="52"></circle>
        </svg>
        <span id="progressPercent" class="progress-percent">0%</span>
      </div>

      <h3>Current Streak</h3>
      <p id="streakCount">0 days</p>

      <h3>Best Streak</h3>
      <p id="bestStreak">0 days</p>
    </div>

  </section>

  <!-- Footer -->
  <footer class="footer">
    <p class="quote">"Make them remember who you are - sameek"</p>
    <p class="credit">created by - @sameekey</p>
  </footer>

</div>
<button id="resetMonth" class="add-btn">Reset Month</button>
<!-- Toast notifications -->
<div id="toastContainer" class="toast-container"></div>

<script src="script.js"></script>
</body>
</html>
